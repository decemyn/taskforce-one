[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Coverage options
addopts = 
    --strict-markers
    --strict-config
    --cov=src/taskforce_one
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --tb=short
    -v

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    api: API tests
    cli: CLI tests

# Minimum version
minversion = 8.0

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
