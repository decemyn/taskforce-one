name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run ruff linter
        run: ruff check src/
      
      - name: Run mypy type checker
        run: mypy src/

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest pytest-cov httpx
      
      - name: Run unit tests
        run: pytest tests/unit -v

      - name: Run integration tests
        run: pytest tests/integration -v

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    environment:
      name: e2e
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=development
          LOG_LEVEL=INFO
          GOOGLE_API_KEY=${{ secrets.GOOGLE_AI_STUDIO_KEY_E2E }}
          POSTGRES_USER=taskforce
          POSTGRES_PASSWORD=taskforce_secret
          POSTGRES_DB=taskforce_db
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_KEY=e2e_test_key
          SECRET_KEY=e2e_test_secret
          EOF
      
      - name: Build Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: taskforce-one:latest
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-docker requests httpx
      
      - name: Start services
        run: |
          docker compose -f docker/docker-compose.yml up -d
          sleep 10
      
      - name: Run E2E tests
        env:
          RUN_E2E_TESTS: "true"
          API_URL: "http://localhost:8000"
        run: |
          pip install -e .
          pytest tests/e2e -v -s
      
      - name: Stop services
        if: always()
        run: docker compose -f docker/docker-compose.yml down

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: taskforce-one:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run safety check
        run: pip install safety && safety check
        continue-on-error: true

