# Task Force One - Docker Compose Configuration
# Supports local development and production deployment

services:
  # Main orchestration service
  taskforce:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: taskforce-one
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
    env_file:
      - ../.env
    volumes:
      - ../config:/app/config:ro
      - taskforce_data:/app/data
    networks:
      - taskforce_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for caching and message queue (optional)
  redis:
    image: redis:7-alpine
    container_name: taskforce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taskforce_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL for persistent storage (optional)
  postgres:
    image: postgres:16-alpine
    container_name: taskforce-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-taskforce}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-taskforce_secret}
      - POSTGRES_DB=${POSTGRES_DB:-taskforce_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taskforce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskforce}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # API Gateway / Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: taskforce-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl:ro
    depends_on:
      - taskforce
    networks:
      - taskforce_network
    profiles:
      - production

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: taskforce-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - taskforce_network
    profiles:
      - monitoring

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: taskforce-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - taskforce_network
    profiles:
      - monitoring

  # Documentation server
  docs:
    image: python:3.11-slim
    container_name: taskforce-docs
    restart: unless-stopped
    ports:
      - "8080:8080"
    working_dir: /app/docs
    command: bash -c "pip install sphinx sphinx-rtd-theme myst-parser sphinx-autodoc-typehints --break-system-packages && sphinx-build -b html docs _build/html && python3 -m http.server 8080"
    volumes:
      - ../docs:/app/docs
      - ../src:/app/src:ro
      - ../config:/app/config:ro
    networks:
      - taskforce_network
    profiles:
      - docs

networks:
  taskforce_network:
    driver: bridge

volumes:
  taskforce_data:
  redis_data:
  postgres_data:
  nginx_ssl:
  prometheus_data:
  grafana_data:
